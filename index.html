<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Favorite Feeds</title>
    <meta name="description" content="A minimal RSS reader." />
    <link rel="stylesheet" href="style.css" />
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%232563eb' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'><path d='M4 11a9 9 0 0 1 9 9'/><path d='M4 4a16 16 0 0 1 16 16'/><circle cx='5' cy='19' r='1'/></svg>" />
  </head>
  <body>
    <header>
      <div class="header-inner">
        <a href="." class="logo">
          <!-- RSS icon -->
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M4 11a9 9 0 0 1 9 9"/>
            <path d="M4 4a16 16 0 0 1 16 16"/>
            <circle cx="5" cy="19" r="1"/>
          </svg>
          Favorite Feeds
        </a>
      </div>
    </header>

    <div class="filter-bar">
      <div class="filter-bar-inner">
        <button class="filter-toggle-btn" id="filter-toggle" aria-expanded="false" aria-controls="filter-panel">
          <svg xmlns="http://www.w3.org/2000/svg" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"/></svg>
          <span id="filter-label">All feeds</span>
          <svg class="filter-chevron" xmlns="http://www.w3.org/2000/svg" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><polyline points="6 9 12 15 18 9"/></svg>
        </button>
        <div class="filter-panel" id="filter-panel" role="group" aria-label="Select feeds" hidden></div>
      </div>
    </div>

    <main>
      <div id="articles-container"></div>
    </main>

    <footer>
      Built with ♥ &mdash; <a href="https://github.com/mrigankpawagi/feed" target="_blank" rel="noopener noreferrer">source</a>
    </footer>

    <script src="feeds.js"></script>
    <script src="app.js"></script>
  </body>
</html>
